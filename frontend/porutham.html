<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Porutham Marriage Compatibility Results — 10-Point Analysis">
    <title>Porutham Results — வ உ சி யின் உறவைத் தேடி</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar" data-html2canvas-ignore>
        <a href="index.html" class="navbar__logo">
            <svg class="navbar__logo-icon" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2" /><path d="M12 20v2" />
                <path d="m4.93 4.93 1.41 1.41" /><path d="m17.66 17.66 1.41 1.41" />
                <path d="M2 12h2" /><path d="M20 12h2" />
                <path d="m6.34 17.66-1.41 1.41" /><path d="m19.07 4.93-1.41 1.41" />
            </svg>
            <span class="navbar__logo-text">வ உ சி யின் உறவைத் தேடி</span>
        </a>
        <ul class="navbar__links" id="navLinks">
            <li><a href="index.html" class="navbar__link" data-i18n="nav_home">Home</a></li>
            <li><a href="form.html" class="navbar__link" data-i18n="nav_generate">Generate Chart</a></li>
            <li><a href="form.html#matching" class="navbar__link navbar__link--active" data-i18n="nav_matching">Matching</a></li>
            <li><a href="index.html#about" class="navbar__link" data-i18n="nav_about">About</a></li>
            <li><a href="history.html" class="navbar__link" data-i18n="nav_history">History</a></li>
        </ul>
        <div class="navbar__right">
            <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">தமிழ்</button>
        </div>
        <button class="navbar__hamburger" onclick="document.getElementById('navLinks').classList.toggle('active')">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Printable Content Wrapper -->
    <div id="printArea">

    <!-- Page Header -->
    <div class="page-header">
        <div class="section__label" data-i18n="porutham_label">MARRIAGE COMPATIBILITY</div>
        <h1 class="section__title" style="margin-top: 12px;" data-i18n="porutham_title">Porutham Analysis</h1>
        <p class="section__subtitle" id="poruthamSubtitle" style="margin-top: 8px;"></p>
    </div>

    <!-- Score Section -->
    <div class="score-section">
        <div class="score-circle">
            <div class="score-circle__value" id="scoreValue">—</div>
            <div class="score-circle__label" data-i18n="porutham_score_label">Porutham</div>
        </div>
        <div class="score-summary">
            <h2 class="score-summary__title" id="verdictTitle">Calculating...</h2>
            <p class="score-summary__desc" id="verdictDesc"></p>
            <div class="score-badge" id="verdictBadge" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                <span id="verdictBadgeText"></span>
            </div>
        </div>
    </div>

    <!-- Porutham Table -->
    <div class="porutham-section">
        <h3 class="porutham-section__title" data-i18n="porutham_detail_title">Detailed Porutham Results</h3>
        <table class="porutham-table">
            <thead>
                <tr>
                    <th data-i18n="th_hash">#</th>
                    <th data-i18n="th_porutham">Porutham</th>
                    <th data-i18n="th_status">Status</th>
                    <th data-i18n="th_description">Description</th>
                </tr>
            </thead>
            <tbody id="poruthamTableBody">
            </tbody>
        </table>
    </div>

    </div><!-- End #printArea -->

    <!-- Actions -->
    <div class="submit-area" style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
        <button class="btn btn--primary" onclick="downloadPDF('printArea', 'Porutham_Results_VOC.pdf')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7 10 12 15 17 10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span data-i18n="btn_download_results">Download Results PDF</span>
        </button>
        <a href="results.html" class="btn btn--secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect width="7" height="7" x="3" y="3" rx="1" />
                <rect width="7" height="7" x="14" y="3" rx="1" />
                <rect width="7" height="7" x="14" y="14" rx="1" />
                <rect width="7" height="7" x="3" y="14" rx="1" />
            </svg>
            <span data-i18n="btn_view_charts">View Charts</span>
        </a>
        <a href="form.html" class="btn btn--primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
            </svg>
            <span data-i18n="btn_new_matching">New Matching</span>
        </a>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initLanguage();
            loadPorutham();
        });
    </script>
</body>

</html>
